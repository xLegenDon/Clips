name: Daily Instagram Clip Posting

on:
  schedule:
    # Every 45 minutes, each posting one clip (32 slots/day). 45 doesn't
    # divide 60 evenly, so this is expressed as a repeating 3-hour cycle
    # (:00, :45, +1h30 -> :30, +1h15 -> :15, then the cycle repeats every
    # 3 hours) rather than a single cron expression. With ~20 clips/day
    # supplied, the later slots each day just find nothing pending and
    # exit — Instagram's API hard-caps at 25 posts/24h regardless, so
    # don't push daily supply much past ~20-24.
    - cron: "0 0,3,6,9,12,15,18,21 * * *"
    - cron: "45 0,3,6,9,12,15,18,21 * * *"
    - cron: "30 1,4,7,10,13,16,19,22 * * *"
    - cron: "15 2,5,8,11,14,17,20,23 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "How many clips to post this run"
        required: false
        default: "1"

jobs:
  post-clips:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Post daily clips
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          DAILY_POST_LIMIT: ${{ github.event.inputs.limit || '1' }}
        run: python scripts/post_daily_clips.py

      - name: Commit archived clips
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add clips/
          git diff --cached --quiet || git commit -m "Archive posted clips [skip ci]"
          git push
