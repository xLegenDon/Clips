name: Update Reel Insights

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch: {}

jobs:
  update-insights:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Fetch and log insights
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: python scripts/update_insights.py

      - name: Commit insights log
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add clips/insights_log.csv
          git diff --cached --quiet || git commit -m "Update Reel insights log [skip ci]"
          git push
